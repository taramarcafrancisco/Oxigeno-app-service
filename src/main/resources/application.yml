server:
  port: ${PORT:8080}

spring:
  main:
    lazy-initialization: true

  cloud:
    config:
      enabled: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oxigenobd?sslmode=require}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${SHOW_SQL:false}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  mvc:
    hiddenmethod:
      filter:
        enabled: true

  thymeleaf:
    cache: false
    suffix: .html

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate: ERROR

jwt:
  secret: ${JWT_SECRET:ubidata_2026_super_secret_key_1234567890}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}