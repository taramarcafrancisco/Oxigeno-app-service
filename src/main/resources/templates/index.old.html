<!DOCTYPE html>
<html>
  <head th:replace="fragments/include :: include">
  </head>
  <body>
    <div th:replace="fragments/header :: menu">
    </div>
   
   
    <div class="container">
        <h3>Carga de archivos </h3>
        <form action="/search" method="get">
          <div class="form-group">
            <label for="date">Fecha</label>
            <input type="date" class="form-control" th:attr="value=${#dates.format(datevalue, 'yyyy-MM-dd')}" id="date" name="date">
          </div>
          <div class="form-group">
            <label for="text">Texto</label>
            <input type="text" class="form-control" th:value="${text}"name="text" id="text">
          </div>
          <button type="submit" class="btn btn-primary">B&uacute;squeda</button>
        </form>
    </div>
   
    <div th:replace="fragments/footer :: footer">
    </div>
  </body>
</html>
